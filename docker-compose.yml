# Wazuh Lab — Student docker-compose
#
# Default bring-up — SIEM stack + victim, no attacker:
#     docker compose pull
#     docker compose up -d
#
# Lab 3 enables the hidden attacker via the 'attack' profile:
#     docker compose --profile attack up -d
#
# Open https://localhost in your browser. Default credentials are admin
# / admin; accept the self-signed certificate. The dashboard takes 1–3
# minutes to be ready after `up`.

services:

  # ────────────────────────────────────────────────────────────
  # Wazuh — central SIEM stack
  # ────────────────────────────────────────────────────────────

  wazuh.manager:
    image: wazuh/wazuh-manager:4.14.5
    hostname: wazuh.manager
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 655360, hard: 655360 }
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - FILEBEAT_SSL_VERIFICATION_MODE=full
      - SSL_CERTIFICATE_AUTHORITIES=/etc/ssl/root-ca.pem
      - SSL_CERTIFICATE=/etc/ssl/filebeat.pem
      - SSL_KEY=/etc/ssl/filebeat.key
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - wazuh_api_configuration:/var/ossec/api/configuration
      - wazuh_etc:/var/ossec/etc
      - wazuh_logs:/var/ossec/logs
      - wazuh_queue:/var/ossec/queue
      - wazuh_var_multigroups:/var/ossec/var/multigroups
      - wazuh_integrations:/var/ossec/integrations
      - wazuh_active_response:/var/ossec/active-response/bin
      - wazuh_agentless:/var/ossec/agentless
      - wazuh_wodles:/var/ossec/wodles
      - filebeat_etc:/etc/filebeat
      - filebeat_var:/var/lib/filebeat
      - ./config/wazuh_indexer_ssl_certs/root-ca-manager.pem:/etc/ssl/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager.pem:/etc/ssl/filebeat.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.manager-key.pem:/etc/ssl/filebeat.key
      - ./config/wazuh_cluster/wazuh_manager.conf:/wazuh-config-mount/etc/ossec.conf
      - ./config/custom-rules/local_rules.xml:/var/ossec/etc/rules/local_rules.xml
      - ./config/custom-rules/local_decoder.xml:/var/ossec/etc/decoders/local_decoder.xml
    networks:
      - wazuh-net

  wazuh.indexer:
    image: wazuh/wazuh-indexer:4.14.5
    hostname: wazuh.indexer
    restart: unless-stopped
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile:  { soft: 65536, hard: 65536 }
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms1g -Xmx1g"
    volumes:
      - wazuh-indexer-data:/var/lib/wazuh-indexer
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer-key.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.key
      - ./config/wazuh_indexer_ssl_certs/wazuh.indexer.pem:/usr/share/wazuh-indexer/config/certs/wazuh.indexer.pem
      - ./config/wazuh_indexer/wazuh.indexer.yml:/usr/share/wazuh-indexer/config/opensearch.yml
      - ./config/wazuh_indexer/internal_users.yml:/usr/share/wazuh-indexer/opensearch-security/internal_users.yml
    networks:
      - wazuh-net

  # One-shot service that initialises the OpenSearch security index on first
  # boot. Uses our custom admin cert (same CA as the indexer) to push the
  # bundled security config + our custom internal_users.yml.
  # Retries until the indexer cluster is GREEN, then exits 0.
  wazuh.indexer.init:
    image: wazuh/wazuh-indexer:4.14.5
    restart: on-failure
    entrypoint: bash
    command:
      - "-c"
      - |
        export OPENSEARCH_JAVA_HOME=/usr/share/wazuh-indexer/jdk
        SEC=/usr/share/wazuh-indexer/plugins/opensearch-security/tools/securityadmin.sh
        CACERT=/init/certs/root-ca.pem
        CERT=/init/certs/admin.pem
        KEY=/init/certs/admin-key.pem
        OPTS="-nhnv -h wazuh.indexer -p 9200 -icl -cacert $$CACERT -cert $$CERT -key $$KEY"
        bash $$SEC -cd /usr/share/wazuh-indexer/config/opensearch-security/ $$OPTS &&
        bash $$SEC -f /init/internal_users.yml -t internalusers $$OPTS
    volumes:
      - ./config/wazuh_indexer/internal_users.yml:/init/internal_users.yml:ro
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/init/certs/root-ca.pem:ro
      - ./config/wazuh_indexer_ssl_certs/admin.pem:/init/certs/admin.pem:ro
      - ./config/wazuh_indexer_ssl_certs/admin-key.pem:/init/certs/admin-key.pem:ro
    networks:
      - wazuh-net
    depends_on:
      - wazuh.indexer

  # Waits for the vulnerability-states index to exist (created after the first
  # agent syscollector scan), then upserts the 5 lab attack CVEs so they appear
  # in the Vulnerabilities view mixed with the noise packages.
  # Uses stable document IDs so re-runs are idempotent and the records survive
  # feed reconciliation (Wazuh uses upsert semantics, not full replacement).
  vuln.seed:
    image: hugopacheco/wazuh-lab-vulnseed:2026.1
    restart: unless-stopped
    environment:
      - INDEXER_URL=https://wazuh.indexer:9200
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
    networks:
      - wazuh-net
    depends_on:
      - wazuh.indexer

  wazuh.dashboard:
    image: wazuh/wazuh-dashboard:4.14.5
    hostname: wazuh.dashboard
    restart: unless-stopped
    ports:
      - "443:5601"            # ← students open https://localhost
    environment:
      - INDEXER_USERNAME=admin
      - INDEXER_PASSWORD=SecretPassword
      - WAZUH_API_URL=https://wazuh.manager
      - DASHBOARD_USERNAME=kibanaserver
      - DASHBOARD_PASSWORD=kibanaserver
      - API_USERNAME=wazuh-wui
      - API_PASSWORD=MyS3cr37P450r.*-
    volumes:
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard.pem
      - ./config/wazuh_indexer_ssl_certs/wazuh.dashboard-key.pem:/usr/share/wazuh-dashboard/certs/wazuh-dashboard-key.pem
      - ./config/wazuh_indexer_ssl_certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem
      - ./config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml
      - ./config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml
      - wazuh-dashboard-config:/usr/share/wazuh-dashboard/data/wazuh/config
      - wazuh-dashboard-custom:/usr/share/wazuh-dashboard/plugins/wazuh/public/assets/custom
    depends_on:
      - wazuh.indexer
      - wazuh.manager
    networks:
      - wazuh-net

  # ────────────────────────────────────────────────────────────
  # Lab targets — opaque images pulled from the registry
  # ────────────────────────────────────────────────────────────

  victim:
    image: hugopacheco/wazuh-lab-victim:2026.1
    hostname: victim
    restart: unless-stopped
    ports:
      - "8080:80"             # ← students open http://localhost:8080
    volumes:
      - ./config/wazuh_agent/ossec.conf:/var/ossec/etc/ossec.conf
      - ./images/victim/html:/var/www/html
      - ./images/victim/apache/cgi-bin:/usr/lib/cgi-bin
    networks:
      - wazuh-net
      - lab-net
    depends_on:
      - wazuh.manager

  attacker:
    image: hugopacheco/wazuh-lab-attacker:2026.1
    hostname: attacker
    restart: unless-stopped
    # Gated behind the 'attack' profile so Labs 1 and 2 can use a quiet
    # stack. Run `docker compose --profile attack up -d` to enable.
    profiles: ["attack"]
    # Only on lab-net. Cannot reach the Wazuh stack. Cannot be reached from the host.
    networks:
      - lab-net
    depends_on:
      - victim

# ────────────────────────────────────────────────────────────

networks:
  wazuh-net:
    driver: bridge
  lab-net:
    driver: bridge

volumes:
  wazuh_api_configuration:
  wazuh_etc:
  wazuh_logs:
  wazuh_queue:
  wazuh_var_multigroups:
  wazuh_integrations:
  wazuh_active_response:
  wazuh_agentless:
  wazuh_wodles:
  filebeat_etc:
  filebeat_var:
  wazuh-indexer-data:
  wazuh-dashboard-config:
  wazuh-dashboard-custom:
